<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Shadow Box - Alerts Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230a0e27' stroke='%2300ff9d' stroke-width='3'/%3E%3Cpath d='M35 35 L65 35 L65 65 L35 65 Z' fill='none' stroke='%2300ff9d' stroke-width='3'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar-fix.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .filter-tabs {
            display: flex;
            gap: 10px;
        }
        .filter-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s ease;
        }
        .filter-btn:hover {
            background: rgba(0,255,157,0.3);
            transform: translateY(-2px);
        }
        .filter-btn.active {
            background: #00ff9d;
            color: #0a0e27;
        }
        .resolve-btn {
            padding: 4px 12px;
            background: linear-gradient(135deg, #00ff9d, #00b8ff);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .resolve-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0,255,157,0.4);
        }
        .badge-critical { background: #ff4444; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .badge-high { background: #ff8844; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .badge-medium { background: #ffaa44; padding: 4px 8px; border-radius: 4px; font-size: 11px; color: #0a0e27; }
        .badge-low { background: #00ff9d; padding: 4px 8px; border-radius: 4px; font-size: 11px; color: #0a0e27; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .refresh-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,157,0.3);
            border-radius: 6px;
            color: #00ff9d;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            background: rgba(0,255,157,0.1);
            transform: scale(1.05);
        }
        .alerts-table-container {
            overflow-x: auto;
        }
        .alerts-table {
            width: 100%;
            border-collapse: collapse;
        }
        .alerts-table th, .alerts-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0,255,157,0.1);
        }
        .alerts-table tr {
            transition: all 0.3s ease;
        }
        .alerts-table tr:hover {
            background: rgba(0,255,157,0.05);
            transform: scale(1.01);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #5a6e8a;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
    </style>
<link rel="stylesheet" href="css/header-fix.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ultimate-meter.css">
<link rel="stylesheet" href="css/sidebar-fix.css">
<link rel="stylesheet" href="css/header-fix.css">
<link rel="stylesheet" href="css/speed-fix.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">
                    <span class="logo-title">SHADOW-BOX</span>
                    <span class="logo-subtitle">SOC v1.0</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="logs.html" class="nav-item">
                    <span class="nav-icon">📜</span>
                    <span>Logs Viewer</span>
                </a>
                <a href="alerts.html" class="nav-item active">
                    <span class="nav-icon">🚨</span>
                    <span>Alerts Panel</span>
                </a>
                <a href="replay.html" class="nav-item">
                    <span class="nav-icon">▶️</span>
                    <span>Attack Replay</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <div class="status-dot online" id="statusDot"></div>
                    <span id="systemStatus">System Online</span>
                </div>
                <div class="api-status connected" id="apiStatus">API: Connected</div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                    <h1>Alerts Panel</h1>
                </div>
                <div class="header-right">
                    <div class="filter-tabs">
                        <button class="filter-btn active" data-filter="all">All Alerts</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="resolved">Resolved</button>
                    </div>
                </div>
            </header>
            
            <div class="alerts-section">
                <div class="section-header">
                    <h3>🚨 SECURITY ALERTS</h3>
                    <button class="refresh-btn" id="refreshAlerts">🔄 Refresh</button>
                </div>
                <div id="alertsList" class="alerts-table-container">
                    <div class="loading">Loading alerts...</div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        let currentFilter = 'all';
        
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('en-US', {
                month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        
        function getSeverityClass(category) {
            const cat = (category || '').toLowerCase();
            if (cat === 'critical') return 'badge-critical';
            if (cat === 'high') return 'badge-high';
            if (cat === 'medium') return 'badge-medium';
            return 'badge-low';
        }
        
        async function loadAlerts() {
            try {
                const status = currentFilter === 'all' ? null : currentFilter;
                let url = `${API_BASE}/api/detect/alerts?limit=50`;
                if (status) url += `&status_filter=${status}`;
                
                console.log('Fetching alerts from:', url);
                const response = await fetch(url);
                const data = await response.json();
                
                const container = document.getElementById('alertsList');
                
                if (!data.success || !data.alerts || data.alerts.length === 0) {
                    container.innerHTML = '<div class="loading">No alerts found</div>';
                    return;
                }
                
                let html = '<table class="alerts-table"><thead><tr>';
                html += '<th>Time</th><th>Alert ID</th><th>Source IP</th><th>Category</th><th>Score</th><th>Status</th><th>Response</th><th>Action</th>';
                html += '</tr></thead><tbody>';
                
                for (const alert of data.alerts) {
                    html += `<tr>
                        <td>${formatTimestamp(alert.timestamp)}</td>
                        <td><code>${alert.alert_id}</code></td>
                        <td><code>${alert.source_ip}</code></td>
                        <td><span class="${getSeverityClass(alert.category)}">${alert.category || 'Unknown'}</span></td>
                        <td><strong>${Math.round(alert.threat_score || 0)}</strong></td>
                        <td>${alert.status || 'unknown'}</td>
                        <td>${alert.response_taken || '—'}</td>
                        <td>${alert.status === 'active' ? `<button class="resolve-btn" data-id="${alert.alert_id}">Resolve</button>` : '✓'}</td>
                    </tr>`;
                }
                
                html += '</tbody></table>';
                container.innerHTML = html;
                
                document.querySelectorAll('.resolve-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const alertId = btn.dataset.id;
                        try {
                            await fetch(`${API_BASE}/api/detect/respond/${alertId}?auto_mode=true`, { method: 'POST' });
                            loadAlerts();
                        } catch(err) {
                            console.error('Failed to resolve:', err);
                        }
                    });
                });
                
            } catch (error) {
                console.error('Failed to load alerts:', error);
                document.getElementById('alertsList').innerHTML = '<div class="loading">⚠️ Error loading alerts. Make sure backend is running on port 8000</div>';
            }
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                loadAlerts();
            });
        });
        
        // Refresh button
        document.getElementById('refreshAlerts')?.addEventListener('click', () => {
            loadAlerts();
        });
        
        // Mobile menu
        document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        });
        
        // Check API status
        async function checkAPIStatus() {
            const apiStatus = document.getElementById('apiStatus');
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    apiStatus.textContent = 'API: Connected';
                    apiStatus.className = 'api-status connected';
                    document.getElementById('statusDot').className = 'status-dot online';
                    document.getElementById('systemStatus').textContent = 'System Online';
                } else {
                    apiStatus.textContent = 'API: Disconnected';
                    apiStatus.className = 'api-status disconnected';
                    document.getElementById('statusDot').className = 'status-dot offline';
                    document.getElementById('systemStatus').textContent = 'System Offline';
                }
            } catch {
                apiStatus.textContent = 'API: Disconnected';
                apiStatus.className = 'api-status disconnected';
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('systemStatus').textContent = 'System Offline';
            }
        }
        
        // Initial load
        loadAlerts();
        checkAPIStatus();
        setInterval(loadAlerts, 10000);
        setInterval(checkAPIStatus, 5000);
    </script>
</body>
</html>
